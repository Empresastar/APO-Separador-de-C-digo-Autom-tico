<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APO Separador de Código Automático</title>
    <style>
        :root {
            --primary: #6200ee;
            --bg: #f5f5f5;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; }

        textarea {
            width: 100%;
            height: 250px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        .output-section {
            margin-top: 20px;
            display: none;
        }

        .file-box {
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            position: relative;
        }

        .file-name {
            color: #e06c75;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid #3e4451;
            padding-bottom: 5px;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }

        .folder-icon { color: #d19a66; }
    </style>
</head>
<body>

<div class="container">
    <h1>✂️ APO Code Splitter</h1>
    <p>Cole seu HTML (com style e script dentro) abaixo:</p>
    
    <textarea id="inputCode" placeholder="<html>... <style>...</style> ... <script>...</script> ...</html>"></textarea>
    
    <button onclick="processCode()">SEPARAR ARQUIVOS E PASTAS</button>

    <div id="output" class="output-section">
        <h3>Estrutura Gerada:</h3>
        
        <div class="file-box">
            <span class="file-name">📄 index.html</span>
            <pre id="outHtml"></pre>
        </div>

        <div class="file-box">
            <span class="file-name"><span class="folder-icon">📂 css/</span>style.css</span>
            <pre id="outCss"></pre>
        </div>

        <div class="file-box">
            <span class="file-name"><span class="folder-icon">📂 js/</span>script.js</span>
            <pre id="outJs"></pre>
        </div>
    </div>
</div>

<script>
    function processCode() {
        const input = document.getElementById('inputCode').value;
        
        // RegEx para extrair conteúdo das tags
        const cssRegex = /<style[^>]*>([\s\S]*?)<\/style>/;
        const jsRegex = /<script[^>]*>([\s\S]*?)<\/script>/;

        const cssMatch = input.match(cssRegex);
        const jsMatch = input.match(jsRegex);

        const cssContent = cssMatch ? cssMatch[1].trim() : "/* Nenhum CSS encontrado */";
        const jsContent = jsMatch ? jsMatch[1].trim() : "// Nenhum JS encontrado";

        // Limpa o HTML e injeta os links externos
        let htmlClean = input
            .replace(cssRegex, '<link rel="stylesheet" href="css/style.css">')
            .replace(jsRegex, '<script src="js/script.js"><\/script>');

        // Exibe os resultados
        document.getElementById('outHtml').textContent = htmlClean;
        document.getElementById('outCss').textContent = cssContent;
        document.getElementById('outJs').textContent = jsContent;
        
        document.getElementById('output').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
