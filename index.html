<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APO Adaptive Architect - Heavy Duty</title>
    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #0b0f1a; --c: #161e2d; --t: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; background: var(--c); padding: 30px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #2d3748; }
        h1 { text-align: center; color: var(--s); margin: 0; font-size: 2rem; letter-spacing: -1px; }
        p { text-align: center; opacity: 0.6; margin-bottom: 25px; font-size: 0.9rem; }
        
        .input-wrapper { position: relative; }
        textarea { 
            width: 100%; height: 350px; background: #000; color: #4ade80; border: 2px solid #2d3748; 
            border-radius: 12px; padding: 20px; font-family: 'Fira Code', 'Consolas', monospace; 
            box-sizing: border-box; outline: none; font-size: 14px; resize: vertical;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        textarea:focus { border-color: var(--p); }

        .btn-main { 
            width: 100%; padding: 20px; background: var(--p); color: #fff; border: none; 
            border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1.1rem; 
            margin-top: 15px; transition: all 0.2s; text-transform: uppercase;
        }
        .btn-main:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-main:active { transform: translateY(0); }

        .tree-view { 
            background: #000; padding: 20px; border-radius: 12px; margin: 25px 0; 
            font-family: monospace; color: #38bdf8; display: none; border: 1px solid #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .output-area { display: none; margin-top: 30px; }
        .file-card { background: #000; border: 1px solid #2d3748; border-radius: 12px; margin-bottom: 30px; overflow: hidden; }
        .file-header { 
            background: #1e293b; padding: 12px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3748;
        }
        .file-name { color: #f472b6; font-weight: 700; font-family: monospace; font-size: 0.95rem; }
        
        pre { 
            margin: 0; padding: 20px; max-height: 600px; overflow: auto; 
            font-size: 13px; white-space: pre; color: #cbd5e1; tab-size: 4;
            background: #000;
        }

        .btn-copy { 
            background: var(--s); color: #000; border: none; padding: 8px 16px; 
            border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-copy:hover { transform: scale(1.05); }

        .section-title { 
            font-size: 1.2rem; color: var(--s); margin: 40px 0 15px; 
            font-weight: 800; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; height: 1px; background: #2d3748; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ APO Adaptive Architect</h1>
    <p>Motor Carga Pesada: Identifica sites simples ou sistemas complexos automaticamente.</p>

    <div class="input-wrapper">
        <textarea id="rawInput" placeholder="Cole aqui seu código (HTML com CSS e JS)..."></textarea>
    </div>
    
    <button class="btn-main" id="processBtn">Desmembrar Projeto Agora</button>

    <div id="visualTree" class="tree-view"></div>

    <div id="resultsWrapper" class="output-area">
        <div class="section-title">📄 DOCUMENTO PRINCIPAL</div>
        <div id="htmlOut"></div>

        <div class="section-title">📂 PASTA CSS</div>
        <div id="cssOut"></div>

        <div class="section-title">📂 PASTA JS</div>
        <div id="jsOut"></div>
    </div>
</div>

<script>
(function() {
    const btn = document.getElementById('processBtn');

    btn.onclick = function() {
        const input = document.getElementById('rawInput').value;
        if (!input.trim()) return alert("O código está vazio!");

        const hOut = document.getElementById('htmlOut');
        const cOut = document.getElementById('cssOut');
        const jOut = document.getElementById('jsOut');
        const tree = document.getElementById('visualTree');

        // Limpa tudo para recomeçar
        hOut.innerHTML = ''; cOut.innerHTML = ''; jOut.innerHTML = '';

        let finalHtml = input;
        let cssCollection = [];
        let jsCollection = [];

        // 1. EXTRAÇÃO DE CSS (MOTOR DE ALTA PRECISÃO)
        // Captura o conteúdo entre as tags <style> preservando tudo
        const styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
        let sMatch;
        let sIdx = 0;
        while ((sMatch = styleRegex.exec(input)) !== null) {
            sIdx++;
            const name = "style" + sIdx + ".css";
            cssCollection.push({ name: name, content: sMatch[1].trim() });
            finalHtml = finalHtml.replace(sMatch[0], '    <link rel="stylesheet" href="css/' + name + '">');
        }

        // 2. EXTRAÇÃO DE JS (MOTOR DE ALTA PRECISÃO)
        // Captura o conteúdo de <script> que não seja link externo
        const scriptRegex = /<script(?![^>]*src=)[^>]*>([\s\S]*?)<\/script>/gi;
        let jMatch;
        let jIdx = 0;
        while ((jMatch = scriptRegex.exec(input)) !== null) {
            jIdx++;
            const name = "script" + jIdx + ".js";
            jsCollection.push({ name: name, content: jMatch[1].trim() });
            finalHtml = finalHtml.replace(jMatch[0], '    <script src="js/' + name + '"><\/script>');
        }

        // 3. RENDERIZAÇÃO DOS CARDS
        // HTML
        addCard(hOut, "index.html", finalHtml.trim(), "idx-1");

        // CSS
        cssCollection.forEach((f, i) => addCard(cOut, "css/" + f.name, f.content, "css-" + i));

        // JS
        jsCollection.forEach((f, i) => addCard(jOut, "js/" + f.name, f.content, "js-" + i));

        // 4. ESTRUTURA DE PASTAS DINÂMICA
        let map = "/* ESTRUTURA DE ARQUIVOS */\n📂 [Projeto Root]\n  📄 index.html\n";
        if(cssCollection.length > 0) {
            map += "  📂 css/\n";
            cssCollection.forEach(f => map += "    📄 " + f.name + "\n");
        }
        if(jsCollection.length > 0) {
            map += "  📂 js/\n";
            jsCollection.forEach(f => map += "    📄 " + f.name + "\n");
        }

        tree.innerText = map;
        tree.style.display = 'block';
        document.getElementById('resultsWrapper').style.display = 'block';
        
        window.scrollTo({ top: tree.offsetTop - 20, behavior: 'smooth' });
    };

    function addCard(target, name, code, id) {
        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `
            <div class="file-header">
                <span class="file-name">${name}</span>
                <button class="btn-copy">COPIAR CÓDIGO</button>
            </div>
            <pre id="${id}">${esc(code)}</pre>
        `;
        
        card.querySelector('.btn-copy').onclick = function() {
            const txt = document.getElementById(id).innerText;
            const b = this;
            navigator.clipboard.writeText(txt).then(() => {
                b.innerText = "✅ COPIADO!";
                setTimeout(() => b.innerText = "COPIAR CÓDIGO", 1200);
            });
        };
        target.appendChild(card);
    }

    function esc(t) {
        return t.split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;');
    }
})();
</script>

</body>
</html>
